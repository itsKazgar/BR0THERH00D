<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BR0THER-H00D</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { background:#000; height:100vh; overflow:hidden; }
#terminal { width:100vw; height:100vh; }
.xterm-viewport { background:#000 !important; }
</style>
</head>
<body>
<div id="terminal"></div>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
<script>
const term = new Terminal({
  cursorBlink: true,
  fontSize: 15,
  fontFamily: "'Courier New', monospace",
  theme: {
    background: '#000000',
    foreground: '#00ffff',
    cursor:     '#00ffff',
    black:      '#000000',
    cyan:       '#00ffff',
    green:      '#00ff88',
    magenta:    '#ff00ff',
    red:        '#ff4444',
    yellow:     '#ffff00',
  },
  cols: 120,
  rows: 40,
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);
term.open(document.getElementById('terminal'));
fitAddon.fit();

const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const ws = new WebSocket(`${proto}//${location.host}/ws/terminal`);
ws.binaryType = 'arraybuffer';

ws.onopen = () => {
  term.onData(data => ws.send(data));
  window.addEventListener('resize', () => {
    fitAddon.fit();
    ws.send(`resize:${term.cols}:${term.rows}`);
  });
};

ws.onmessage = e => {
  if (e.data instanceof ArrayBuffer) {
    term.write(new Uint8Array(e.data));
  } else {
    term.write(e.data);
  }
};

ws.onclose = () => term.write('\r\n\x1b[31mconnection closed\x1b[0m\r\n');
ws.onerror = () => term.write('\r\n\x1b[31mconnection error\x1b[0m\r\n');
</script>
</body>
</html>
